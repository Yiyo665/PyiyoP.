name: Build APK

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: kivy/buildozer:latest

    steps:
      - uses: actions/checkout@v4

      - name: Preparar entorno
        run: |
          chmod -R 777 .
          export BUILDOZER_ALLOW_ROOT=1

      - name: Compilar APK
        run: |
          buildozer android clean
          buildozer android debug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk

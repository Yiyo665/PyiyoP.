name: Build APK

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: kivy/buildozer:latest

    steps:
      - uses: actions/checkout@v4

      - name: Dar permisos
        run: chmod -R 777 .

      - name: Forzar build (permitir root)
        run: |
          export BUILDOZER_ALLOW_ROOT=1
          buildozer -v android debug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk

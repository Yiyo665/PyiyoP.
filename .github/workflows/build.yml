name: Build APK

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: kivy/buildozer:latest
      options: --user 1000

    steps:
      - uses: actions/checkout@v4

      - name: Dar permisos
        run: chmod -R 777 .

      - name: Build APK
        run: buildozer android debug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk

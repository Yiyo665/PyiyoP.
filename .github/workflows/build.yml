name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar código
      uses: actions/checkout@v3

    - name: Instalar dependencias
      run: |
        sudo apt update
        sudo apt install -y zip unzip openjdk-17-jdk python3-pip
        pip install buildozer cython

    - name: Compilar APK
      run: |
        buildozer init || true
        sed -i 's/requirements = .*/requirements = python3,kivy,sqlite3,pandas,openpyxl,reportlab/' buildozer.spec
        buildozer -v android debug

    - name: Subir APK
      uses: actions/upload-artifact@v4
      with:
        name: APK
        path: bin/*.apk

name: Build APK

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependencias
        run: |
          sudo apt update
          sudo apt install -y zip unzip wget openjdk-17-jdk python3-pip git \
          libffi-dev libssl-dev libjpeg-dev zlib1g-dev \
          autoconf libtool pkg-config

          python3 -m pip install --upgrade pip
          pip install buildozer cython

      # 👇 NUEVO BLOQUE PARA SDK y build-tools
      - name: Instalar Android SDK build-tools
        run: |
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip cmdline-tools.zip -d $HOME/cmdline-tools
          mkdir -p $HOME/android-sdk/cmdline-tools
          mv $HOME/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses
          sdkmanager --sdk_root=$ANDROID_SDK_ROOT "build-tools;34.0.0" "platforms;android-34"

      - name: Inicializar buildozer
        run: |
          buildozer init || true

      - name: Configurar buildozer
        run: |
          sed -i 's/^requirements = .*/requirements = python3,kivy/' buildozer.spec
          sed -i 's/^#android.arch = .*/android.arch = arm64-v8a/' buildozer.spec

      - name: Compilar APK
        env:
          ANDROID_SDK_ROOT: $HOME/android-sdk
          PATH: $HOME/android-sdk/cmdline-tools/latest/bin:$PATH
        run: |
          buildozer -v android debug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: bin/*.apk

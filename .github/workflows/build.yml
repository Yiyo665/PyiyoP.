name: Build APK

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: kivy/buildozer:latest

    steps:
      - uses: actions/checkout@v4

      - name: Crear usuario
        run: |
          useradd -m user
          chown -R user:user .

      - name: Build APK
        run: |
          su user -c "buildozer android debug"

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk

name: Build APK

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # 1️⃣ Clonar el repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Instalar dependencias del sistema y paquetes Python
      - name: Install system dependencies and Python packages
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git zip unzip openjdk-17-jdk wget
          python3 -m pip install --upgrade pip
          # Instalar Buildozer, Cython y python-for-android desde pip
          pip install buildozer cython python-for-android

      # 3️⃣ Instalar Android SDK en la ruta que Buildozer espera
      - name: Install Android SDK
        run: |
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/tools
          cd $HOME/.buildozer/android/platform/android-sdk/tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-8092744_latest.zip -O commandlinetools.zip
          unzip -o commandlinetools.zip
          mv cmdline-tools latest

          export ANDROIDSDK=$HOME/.buildozer/android/platform/android-sdk
          export PATH=$ANDROIDSDK/tools/latest/bin:$ANDROIDSDK/platform-tools:$ANDROIDSDK/build-tools/31.0.0:$PATH

          # Aceptar licencias y descargar herramientas necesarias
          yes | sdkmanager --licenses
          sdkmanager "platform-tools"
          sdkmanager "platforms;android-31"
          sdkmanager "build-tools;31.0.0"

      # 4️⃣ Inicializar Buildozer si no existe buildozer.spec
      - name: Initialize Buildozer
        run: |
          buildozer init || true

      # 5️⃣ Configurar buildozer.spec para requerimientos mínimos
      - name: Configure buildozer.spec
        run: |
          sed -i 's/^requirements = .*/requirements = python3,kivy/' buildozer.spec

      # 6️⃣ Compilar la APK de Android
      - name: Build APK
        run: |
          export BUILDOZER_ALLOW_ROOT=1
          export ANDROIDSDK=$HOME/.buildozer/android/platform/android-sdk
          export PATH=$ANDROIDSDK/tools/latest/bin:$ANDROIDSDK/platform-tools:$ANDROIDSDK/build-tools/31.0.0:$PATH

          # Limpiar compilaciones previas y compilar APK
          buildozer android clean
          buildozer android debug

      # 7️⃣ Subir APK generado como artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk

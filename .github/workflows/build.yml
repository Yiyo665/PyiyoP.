name: Build APK

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # 1️⃣ Clonar el repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Instalar dependencias del sistema y Python
      - name: Install system dependencies and Python packages
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git zip unzip openjdk-17-jdk wget
          python3 -m pip install --upgrade pip
          pip install buildozer cython python-for-android

      # 3️⃣ Instalar Android SDK en la ruta que Buildozer espera
      - name: Install Android SDK
        run: |
          export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk

          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          cd $ANDROID_SDK_ROOT/cmdline-tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-8092744_latest.zip -O cmdline-tools.zip
          unzip -o cmdline-tools.zip
          mv cmdline-tools latest

          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/build-tools/31.0.0:$PATH
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-31" "build-tools;31.0.0"

      # 4️⃣ Inicializar Buildozer si no existe buildozer.spec
      - name: Initialize Buildozer
        run: |
          buildozer init || true

      # 5️⃣ Configurar buildozer.spec
      - name: Configure buildozer.spec
        run: |
          sed -i 's/^requirements = .*/requirements = python3,kivy/' buildozer.spec

      # 6️⃣ Crear symlink de python-for-android para Buildozer
      - name: Link python-for-android for Buildozer
        run: |
          P4A_PATH=$(python3 -c "import os, pythonforandroid; print(os.path.dirname(pythonforandroid.__file__))")
          mkdir -p $HOME/.buildozer/android/platform
          ln -s $P4A_PATH $HOME/.buildozer/android/platform/python-for-android
          echo "Python-for-Android linked at $HOME/.buildozer/android/platform/python-for-android"

      # 7️⃣ Compilar la APK
      - name: Build APK
        run: |
          export BUILDOZER_ALLOW_ROOT=1
          export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/build-tools/31.0.0:$PATH

          buildozer android clean
          buildozer android debug

      # 8️⃣ Subir APK generado como artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
